<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TravelMind AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="shell">
    <header>
      <div class="logo">TM</div>
      <div><h1>TravelMind AI</h1><p>סוכן תכנון טיולים מבוסס Gemini ודאטה</p></div>
    </header>
    <section class="hero" id="hero">
      <span class="tag">1,561 יעדים · שיחה חופשית עם Gemini · זיהוי שגיאות כתיב · רשימת ציוד מותאמת</span>
      <h2>לאן מתאים לך לנסוע?</h2>
      <p>התחילו שיחה קצרה עם TravelMind — אפשר לכתוב “היי”, ואני אשאל כמה שאלות מכוונות עד שאבנה לכן המלצה מהדאטה.</p>
      <div class="examples">
        <button>היי</button>
        <button>אני רוצה לתכנן טיול</button>
        <button>בא לי חופשה אבל אני לא יודעת לאן</button>
      </div>
    </section>
    <section id="conversation" class="conversation"></section>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="אפשר לכתוב חופשי: בא לי חופים, 4 ימים, זוג, 5,000 ₪..." required>
      <button type="submit">תכנן לי</button>
    </form>
  </main>
  <script>
    const form = document.querySelector("#form");
    const input = document.querySelector("#input");
    const conversation = document.querySelector("#conversation");
    const hero = document.querySelector("#hero");

    const escapeHtml = (value) => {
      const node = document.createElement("div");
      node.textContent = value ?? "";
      return node.innerHTML;
    };

    const searchUrls = (query) => {
      const q = encodeURIComponent(query || "");
      return {
        google: `https://www.google.com/search?q=${q}`,
        maps: `https://www.google.com/maps/search/${q}`,
        tripadvisor: `https://www.tripadvisor.com/Search?q=${q}`,
        wikipedia: `https://www.google.com/search?q=${q}%20Wikipedia`
      };
    };

    function searchButtons(query) {
      const urls = searchUrls(query);
      return `<div class="search-buttons">
        <a href="${urls.google}" target="_blank" rel="noopener">Google</a>
        <a href="${urls.maps}" target="_blank" rel="noopener">Maps</a>
        <a href="${urls.tripadvisor}" target="_blank" rel="noopener">Tripadvisor</a>
        <a href="${urls.wikipedia}" target="_blank" rel="noopener">Wikipedia</a>
      </div>`;
    };

    function bookingButton(item) {
      const query = encodeURIComponent(`${item.city || ""} ${item.country || ""}`.trim());
      return `<a class="booking-link" href="https://www.booking.com/searchresults.html?ss=${query}" target="_blank" rel="noopener">🏨 צפייה במלונות ב-Booking</a>`;
    }

    function destinationPhotos(item, language) {
      const english = language === "en";
      const city = item.city || "";
      const country = item.country || "";
      const query = encodeURIComponent(`${city} ${country} travel destination landmark`);
      const label = english ? "Photos from the selected destination" : "תמונות מהיעד שנבחר";
      const photos = [1, 2, 3].map(index =>
        `<img src="https://source.unsplash.com/520x340/?${query}&sig=${index}" alt="${escapeHtml(city)} ${escapeHtml(country)} ${index}" loading="lazy" onerror="this.style.display='none'">`
      ).join("");
      return `<section class="destination-photos" aria-label="${label}">
        <div class="photo-title">📸 ${label}</div>
        <div class="photo-grid">${photos}</div>
      </section>`;
    }

    function destinationCard(item, winner, language) {
      const english = language === "en";
      const temp = item.temperature?.avg !== undefined ? `${item.temperature.avg}°C ${english ? "average" : "ממוצע"}` : (english ? "Climate unavailable" : "אקלים לא זמין");
      const strengths = (item.strengths || []).slice(0, 3).map(x => `<span>${escapeHtml(x.label)} ${"★".repeat(x.rating)}</span>`).join("");
      return `<article class="destination hero-destination ${winner ? "winner" : ""}">
        <p class="region">${escapeHtml(item.region)}</p>
        <h3><a href="${escapeHtml(item.source_url || '#')}" target="_blank" rel="noopener">${escapeHtml(item.city)}, ${escapeHtml(item.country)}</a></h3>
        ${destinationPhotos(item, language)}
        <p class="destination-description">${escapeHtml(item.description)}</p>
        <div class="facts">
          <b class="score-chip">${item.score}% התאמה</b>
          <b>${escapeHtml(item.budget)}</b>
          <a class="weather-chip" href="${escapeHtml(item.weather_url || item.source_url || '#')}" target="_blank" rel="noopener">🌤️ ${temp} · מזג אוויר בחודש שבחרת</a>
        </div>
        <div class="strengths">${strengths}</div>
        <div class="destination-actions">
          <span class="choose-label">${english ? "Choose where to search:" : "בחרי איפה לחפש:"}</span>
          ${searchButtons(item.source_query || `${item.city} ${item.country} tourism`)}
        </div>
      </article>`;
    }

    function recommendationSection(title, items, icon) {
      if (!items || !items.length) return "";
      const cards = items.map(item => {
        const name = item.name || item.title || "";
        const query = item.source_query || name;
        return `<article class="mini-card"><span class="mini-icon">${icon}</span><b>${escapeHtml(name)}</b><small>${escapeHtml(item.reason || item.summary || "")}</small>${searchButtons(query)}</article>`;
      }).join("");
      return `<section class="bundle-section"><div class="bundle-title-row"><h3>${escapeHtml(title)}</h3><span>בחרי איפה לחפש כל פריט</span></div><div class="mini-grid">${cards}</div></section>`;
    }


    function bulletList(items) {
      return (items || []).map(item => `<li>${escapeHtml(item)}</li>`).join("");
    }

    function packingListSection(packing) {
      if (!packing || !packing.items?.length) return "";
      return `<section class="packing-box">
        <div class="packing-heading"><span>🧳</span><div><h2>${escapeHtml(packing.title)}</h2><p>${escapeHtml(packing.subtitle || "")}</p></div></div>
        <ul class="packing-grid">${(packing.items || []).map(item => `<li><span>✓</span>${escapeHtml(item)}</li>`).join("")}</ul>
      </section>`;
    }

    function addResult(message, data) {
      if (data.type === "question") {
        const suggestions = (data.suggestions || []).map(text =>
          `<button type="button" class="followup" data-answer="${escapeHtml(text)}">${escapeHtml(text)}</button>`
        ).join("");
        conversation.insertAdjacentHTML("beforeend", `
          <div class="user">${escapeHtml(message)}</div>
          <section class="answer question"><div class="summary"><b>${escapeHtml(data.reply)}</b></div>
          ${data.corrected_text ? `<p class="correction">זיהיתי ותיקנתי ניסוח/שגיאת כתיב: ${escapeHtml(data.corrected_text)}</p>` : ""}
          ${suggestions ? `<div class="examples">${suggestions}</div>` : ""}</section>`);
        conversation.querySelectorAll(".followup").forEach(button => {
          if (!button.dataset.bound) {
            button.dataset.bound = "true";
            button.addEventListener("click", () => send(button.dataset.answer));
          }
        });
        window.scrollTo({top: document.body.scrollHeight, behavior: "smooth"});
        return;
      }
      const english = data.language === "en";
      const pack = data.recommendation_pack || {};
      conversation.insertAdjacentHTML("beforeend", `
        <div class="user">${escapeHtml(message)}</div>
        <section class="answer compact-answer">
          <div class="summary"><b>${escapeHtml(data.reply)}</b><span>${data.understood.preferences.join(", ")} · ${data.understood.days} ${english ? "days" : "ימים"} · ${escapeHtml(data.understood.budget)}</span></div>
          ${data.corrected_text ? `<p class="correction">זיהיתי ותיקנתי ניסוח/שגיאת כתיב: ${escapeHtml(data.corrected_text)}</p>` : ""}
          <div class="grid single-grid">${data.destinations.map((x, i) => destinationCard(x, i === 0, data.language)).join("")}</div>
          <section class="bundle">
            <h2>חבילת המלצות ל-${escapeHtml(data.destinations[0].city)}</h2>
            <div class="hotel-action">${bookingButton(data.destinations[0])}</div>
            ${recommendationSection("מוזיאונים ותרבות", pack.culture, "🏛️")}
            ${recommendationSection("מסעדות ואזורי אוכל", pack.food, "🍽️")}
          </section>
          ${packingListSection(data.packing_list)}
        </section>`);
      window.scrollTo({top: document.body.scrollHeight, behavior: "smooth"});
    }

    async function send(message) {
      hero.hidden = true;
      input.disabled = true;
      const loading = document.createElement("div");
      loading.className = "loading";
      loading.textContent = "Gemini מנתח את ההקשר, מתקן שגיאות ומחליט אם לשאול המשך או לבנות המלצה...";
      conversation.appendChild(loading);
      try {
        const response = await fetch("/chat", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({message})
        });
        const data = await response.json();
        loading.remove();
        if (!response.ok) {
          const errorText = data?.error || data?.message || "אירעה שגיאה בשרת.";
          conversation.insertAdjacentHTML("beforeend", `<section class="answer question"><div class="summary"><b>${escapeHtml(errorText)}</b></div></section>`);
        } else {
          addResult(message, data);
        }
      } catch (error) {
        loading.textContent = "לא הצלחתי להשלים את הבקשה. נסו שוב.";
      } finally {
        input.disabled = false; input.value = ""; input.focus();
      }
    }

    form.addEventListener("submit", event => {
      event.preventDefault(); send(input.value.trim());
    });
    document.querySelectorAll(".examples button").forEach(button => {
      button.addEventListener("click", () => send(button.textContent));
    });
  </script>
</body>
</html>
